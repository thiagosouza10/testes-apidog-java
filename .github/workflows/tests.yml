name: Dog API Java

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        run: |
          mvn dependency:get -Dartifact=org.aspectj:aspectjweaver:1.9.20.1
          mvn clean test
        continue-on-error: true

      - name: Check Allure Results
        run: |
          test -d target/allure-results
          test "$(find target/allure-results -type f | wc -l)" -gt 0

      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
          tar -zxvf allure-2.24.0.tgz
          sudo ln -s $(pwd)/allure-2.24.0/bin/allure /usr/bin/allure

      - name: Generate Allure Report
        run: allure generate target/allure-results --clean -o allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
